<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050303">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>modo coche — el arca de noé</title>
  <meta name="description" content="Las trece canciones de El Arca de Noé en un reproductor sencillo para el coche.">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --black: #050303;
      --panel: rgba(9, 5, 4, .9);
      --panel-strong: rgba(15, 7, 5, .96);
      --ink: #eee2ca;
      --ink-soft: #cbb99a;
      --muted: #9e8969;
      --line: rgba(172, 137, 96, .34);
      --red: #d84b37;
      --red-bright: #f06049;
      --red-dark: #6e1a12;
      --focus: #ffd3a2;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: var(--black);
      scroll-behavior: smooth;
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      background: var(--black);
      font-family: 'Courier Prime', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      position: fixed;
      z-index: 0;
      inset: 0;
      content: '';
      background-image: url('../fotos/textura-cajas.png');
      background-position: center top;
      background-size: min(940px, 145vw) auto;
      filter: grayscale(1) contrast(1.35) brightness(.63);
      opacity: .23;
      pointer-events: none;
    }

    body::after {
      position: fixed;
      z-index: 0;
      inset: 0;
      content: '';
      background:
        radial-gradient(circle at 14% 2%, rgba(208, 35, 20, .22), transparent 34rem),
        linear-gradient(180deg, rgba(0, 0, 0, .2), rgba(0, 0, 0, .72));
      pointer-events: none;
    }

    button,
    input { font: inherit; }

    button,
    a,
    input { -webkit-tap-highlight-color: transparent; }

    button { touch-action: manipulation; }

    ::selection {
      color: #fff8eb;
      background: var(--red-dark);
    }

    .app-shell {
      position: relative;
      z-index: 1;
      width: min(1180px, 100%);
      min-height: 100dvh;
      margin: 0 auto;
      padding:
        max(22px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(34px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
    }

    .site-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: clamp(18px, 3vw, 34px);
    }

    .brand-kicker {
      margin: 0 0 4px;
      color: var(--red-bright);
      font-size: clamp(12px, 1.2vw, 15px);
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .site-name {
      margin: 0;
      font: italic 500 clamp(36px, 5vw, 68px)/.92 'Cormorant Garamond', Georgia, serif;
      letter-spacing: -.035em;
    }

    .archive-link {
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--ink-soft);
      background: rgba(0, 0, 0, .48);
      font-size: 13px;
      letter-spacing: .06em;
      text-decoration: none;
      white-space: nowrap;
    }

    .archive-link:hover { border-color: var(--red); color: var(--ink); }

    .archive-link:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 4px;
    }

    .cockpit {
      display: grid;
      gap: clamp(18px, 3vw, 34px);
    }

    .player-panel,
    .track-list-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(145deg, var(--panel-strong), var(--panel));
      box-shadow: 0 22px 70px rgba(0, 0, 0, .54);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .player-panel {
      align-self: start;
      padding: clamp(22px, 4vw, 44px);
      overflow: hidden;
    }

    .player-panel::before {
      display: block;
      width: 54px;
      height: 4px;
      margin-bottom: clamp(20px, 4vh, 38px);
      border-radius: 99px;
      content: '';
      background: var(--red);
      box-shadow: 0 0 20px rgba(216, 75, 55, .68);
    }

    .track-counter {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: clamp(14px, 1.5vw, 18px);
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .track-title {
      min-height: 1.8em;
      margin: 0;
      font: italic 600 clamp(48px, 7.2vw, 92px)/.86 'Cormorant Garamond', Georgia, serif;
      letter-spacing: -.045em;
      text-wrap: balance;
    }

    .track-frase {
      min-height: 1.4em;
      margin: 16px 0 clamp(26px, 5vh, 50px);
      color: var(--ink-soft);
      font-size: clamp(15px, 1.7vw, 20px);
      line-height: 1.35;
    }

    .progress-wrap { margin-bottom: clamp(20px, 4vh, 34px); }

    .progress-slider {
      --progress: 0%;
      width: 100%;
      height: 34px;
      margin: 0;
      border: 0;
      border-radius: 999px;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }

    .progress-slider::-webkit-slider-runnable-track {
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--red) var(--progress), rgba(203, 185, 154, .22) var(--progress));
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, .75);
    }

    .progress-slider::-moz-range-track {
      height: 7px;
      border-radius: 999px;
      background: rgba(203, 185, 154, .22);
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, .75);
    }

    .progress-slider::-moz-range-progress {
      height: 7px;
      border-radius: 999px;
      background: var(--red);
    }

    .progress-slider::-webkit-slider-thumb {
      width: 27px;
      height: 27px;
      margin-top: -10px;
      border: 3px solid #2c0905;
      border-radius: 50%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--ink);
      box-shadow: 0 2px 12px rgba(0, 0, 0, .8);
    }

    .progress-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border: 3px solid #2c0905;
      border-radius: 50%;
      background: var(--ink);
      box-shadow: 0 2px 12px rgba(0, 0, 0, .8);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: -1px;
      color: var(--muted);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .transport {
      display: grid;
      grid-template-columns: 1fr 1.25fr 1fr;
      align-items: center;
      gap: clamp(10px, 2vw, 20px);
    }

    .transport-button {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: clamp(88px, 13vw, 118px);
      padding: 10px 6px;
      border: 1px solid rgba(203, 185, 154, .42);
      border-radius: 10px;
      color: var(--ink);
      background: rgba(0, 0, 0, .46);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .28);
      cursor: pointer;
      transition: transform .12s ease, border-color .15s ease, background .15s ease;
    }

    .transport-button:hover {
      border-color: rgba(240, 96, 73, .78);
      background: rgba(45, 9, 5, .72);
    }

    .transport-button:active { transform: scale(.96); }

    .transport-button--play {
      min-height: clamp(106px, 16vw, 142px);
      border-color: var(--red-bright);
      border-radius: 50%;
      color: #fff6e9;
      background: radial-gradient(circle at 45% 35%, var(--red-bright), #a52a1d 64%, #67150f);
      box-shadow: 0 0 34px rgba(216, 75, 55, .32), 0 14px 30px rgba(0, 0, 0, .38);
    }

    .transport-button--play:hover {
      background: radial-gradient(circle at 45% 35%, #ff765d, #b93122 64%, #73170f);
    }

    .transport-icon {
      display: block;
      font-family: system-ui, sans-serif;
      font-size: clamp(34px, 5vw, 52px);
      line-height: .9;
    }

    .transport-button--play .transport-icon {
      padding-left: .08em;
      font-size: clamp(42px, 6.2vw, 64px);
    }

    .transport-button--play.is-playing .transport-icon { padding-left: 0; }

    .transport-label {
      display: block;
      margin-top: 5px;
      color: var(--ink-soft);
      font-size: clamp(11px, 1.3vw, 15px);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: lowercase;
    }

    .transport-button--play .transport-label { color: #fff1df; }

    .player-status {
      min-height: 1.5em;
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .05em;
      text-align: center;
    }

    .player-status[data-state='playing'] { color: var(--ink-soft); }
    .player-status[data-state='error'] { color: #ff8d79; }

    .track-list-panel { padding: clamp(18px, 3vw, 30px); }

    .list-heading {
      margin: 0 0 6px;
      font: 600 clamp(30px, 4vw, 46px)/1 'Cormorant Garamond', Georgia, serif;
    }

    .list-note {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .track-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .track-row { margin: 0; }

    .track-select {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 13px;
      width: 100%;
      min-height: 72px;
      padding: 10px 13px;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--ink-soft);
      background: rgba(0, 0, 0, .3);
      text-align: left;
      cursor: pointer;
      transition: border-color .15s ease, background .15s ease, color .15s ease, transform .12s ease;
    }

    .track-select:hover {
      border-color: var(--line);
      color: var(--ink);
      background: rgba(34, 13, 9, .64);
    }

    .track-select:active { transform: scale(.985); }

    .track-select[aria-current='true'] {
      border-color: rgba(240, 96, 73, .72);
      color: var(--ink);
      background: linear-gradient(90deg, rgba(119, 25, 17, .58), rgba(26, 9, 6, .74));
      box-shadow: inset 4px 0 0 var(--red-bright);
    }

    .track-number {
      color: var(--red-bright);
      font-size: 14px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .track-name {
      overflow: hidden;
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track-duration {
      color: var(--muted);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    .visually-hidden {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    #audio { display: none; }

    noscript {
      display: block;
      margin-top: 20px;
      padding: 18px;
      border: 1px solid var(--red);
      color: var(--ink);
      background: #200805;
    }

    @media (min-width: 820px) {
      .cockpit { grid-template-columns: minmax(0, 1.12fr) minmax(340px, .88fr); }

      .player-panel {
        position: sticky;
        top: max(18px, env(safe-area-inset-top));
      }
    }

    @media (max-width: 620px) {
      .site-header { align-items: start; }
      .archive-link { min-height: 44px; padding-inline: 11px; font-size: 11px; }
      .player-panel { padding-inline: 18px; }
      .track-title { font-size: clamp(46px, 15vw, 70px); }
      .transport { gap: 9px; }
      .transport-button { min-height: 84px; border-radius: 8px; }
      .transport-button--play { min-height: 104px; }
      .transport-label { font-size: 10px; }
      .track-select { min-height: 68px; }
    }

    @media (max-width: 390px) {
      .archive-link { width: 48px; overflow: hidden; color: transparent; }
      .archive-link::before { color: var(--ink-soft); content: '← web'; white-space: nowrap; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="site-header">
      <div>
        <p class="brand-kicker">modo coche</p>
        <p class="site-name">el arca de noé</p>
      </div>
      <a class="archive-link" href="../" aria-label="volver al archivo">← volver al archivo</a>
    </header>

    <div class="cockpit">
      <section class="player-panel" aria-labelledby="track-title">
        <p class="track-counter" id="track-counter">01 / 13</p>
        <h1 class="track-title" id="track-title" aria-live="polite">Bolboretas</h1>
        <p class="track-frase" id="track-frase">berros contra a fiestra</p>

        <div class="progress-wrap">
          <label class="visually-hidden" for="progress">posición de la canción</label>
          <input class="progress-slider" id="progress" type="range" min="0" max="1000" value="0" step="1" aria-label="posición de la canción">
          <div class="time-row" aria-hidden="true">
            <span id="current-time">0:00</span>
            <span id="total-time">3:06</span>
          </div>
        </div>

        <div class="transport" aria-label="controles de reproducción">
          <button class="transport-button" id="previous" type="button" aria-label="canción anterior">
            <span class="transport-icon" aria-hidden="true">⏮</span>
            <span class="transport-label">anterior</span>
          </button>
          <button class="transport-button transport-button--play" id="play" type="button" aria-label="reproducir">
            <span class="transport-icon" id="play-symbol" aria-hidden="true">▶</span>
            <span class="transport-label" id="play-label">reproducir</span>
          </button>
          <button class="transport-button" id="next" type="button" aria-label="canción siguiente">
            <span class="transport-icon" aria-hidden="true">⏭</span>
            <span class="transport-label">siguiente</span>
          </button>
        </div>

        <p class="player-status" id="player-status" data-state="ready" aria-live="polite">lista para sonar</p>
        <audio id="audio" preload="metadata" playsinline></audio>
      </section>

      <section class="track-list-panel" aria-labelledby="list-heading">
        <h2 class="list-heading" id="list-heading">las trece canciones</h2>
        <p class="list-note">toca una para escucharla · al terminar pasará a la siguiente</p>
        <ol class="track-list" id="track-list"></ol>
      </section>
    </div>

    <noscript>Activa JavaScript para escuchar las canciones.</noscript>
  </main>

  <script type="module" src="./player.js"></script>
</body>
</html>
